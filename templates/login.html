<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --red: #C70851; --dark: #333333; }
        body { background: #f4f4f4; font-family: sans-serif; }
        .header { background: var(--dark); padding: 15px; border-bottom: 4px solid var(--red); color: white; }
        .card { border-top: 5px solid var(--red); border-radius: 10px; }
        .btn-red { background: var(--red); color: white; font-weight: bold; }
    </style>
</head>
<body>
<div class="header d-flex align-items-center justify-content-start px-4">
    <img src="/static/logo.png" height="80" class="me-3">
    <h6 class="m-0 fw-bold">LG Electronics India</h6>
</div>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 card p-4 shadow-sm">
            <form action="/login" method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <select name="role" class="form-select mb-3">
                    <option value="user">worker/user</option>
                    <option value="admin">admin</option>
                </select>
                <button class="btn btn-red w-100">LOGIN</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
