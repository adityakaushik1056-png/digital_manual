<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner Dashboard | LG Smart Factory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --lg-red: #C70851;
            --charcoal: #333333;
            --soft-white: #fcfcfc;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .glass-nav {
            background: rgba(51, 51, 51, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 3px solid var(--lg-red);
            padding: 12px 0;
        }

        .scanner-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .step-box {
            background: #fff5f8;
            border-left: 4px solid var(--lg-red);
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            margin-bottom: 20px;
        }

        #reader {
            border: 2px dashed #ddd !important;
            border-radius: 15px;
            overflow: hidden;
            background: #fafafa;
        }

        #reader__dashboard_section_csr button {
            background-color: var(--lg-red) !important;
            color: white !important;
            border: none !important;
            padding: 8px 20px !important;
            border-radius: 20px !important;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
        }

        .user-badge {
            background: rgba(199, 8, 81, 0.1);
            color: var(--lg-red);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="glass-nav sticky-top shadow-lg">
        <div class="container d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="height: 80px; margin-right: 12px;">
                <div class="text-white">
                    <h6 class="m-0 fw-bold">LG Electronics India</h6>
                    <small class="opacity-75" style="font-size: 10px;">Machine QR Scan</small>
                </div>
            </div>
            <a href="/logout" class="btn btn-outline-light btn-sm rounded-pill px-3 border-0">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="text-center mb-4">
                    <span class="user-badge mb-2 d-inline-block">Operator: {{ user }}</span>
                    <h2 class="fw-bold text-dark">Ready to Scan?</h2>
                </div>

                <div class="card scanner-card p-4">
                    <div class="step-box">
                        <small class="text-uppercase fw-bold text-danger d-block mb-1">Instruction</small>
                        <p class="m-0 small text-muted">
                            Machine par lage <strong>QR Code</strong> ko camera ke frame mein rakhein. Documentation automatic open ho jayegi.
                        </p>
                    </div>

                    <div id="reader" class="mb-3"></div>

                    <div class="text-center mt-3">
                        <p class="small text-muted mb-0"><i class="bi bi-shield-check"></i> Secure Industrial Access</p>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <p class="text-muted" style="font-size: 0.8rem;">&copy; 2026 LG Electronics India Pvt. Ltd. All Rights Reserved.</p>
                </div>

            </div>
        </div>
    </div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            console.log(`Scan result: ${decodedText}`);
            // Redirect to machine page
            window.location.href = decodedText;
        }

        function onScanFailure(error) {
            console.warn(`Scan error: ${error}`);
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 15, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
            false
        );
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
