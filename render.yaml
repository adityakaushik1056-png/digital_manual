services:
  - type: web
    name: digital-manual
    env: python
    plan: free   # or starter/standard depending on your Render plan
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: gunicorn app:app   # replace "app:app" with your Flask entrypoint
    environment:
      pythonVersion: 3.11.9
